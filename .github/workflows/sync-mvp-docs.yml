name: Sync MVP docs to main

on:
  push:
    branches:
      - mvp/rtma-humidity
    paths:
      - 'docs/mvp/**'
      - 'docs/wind/**'
      - 'mkdocs.yml'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Copy docs and mkdocs.yml from MVP branch
        run: |
          git checkout origin/mvp/rtma-humidity -- docs/mvp/
          git checkout origin/mvp/rtma-humidity -- docs/wind/
          git checkout origin/mvp/rtma-humidity -- docs/javascripts/
          git checkout origin/mvp/rtma-humidity -- mkdocs.yml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/mvp/ docs/wind/ docs/javascripts/ mkdocs.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync MVP docs from mvp/rtma-humidity"
            git push origin main
          fi
