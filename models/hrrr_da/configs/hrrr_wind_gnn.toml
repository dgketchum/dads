name = "hrrr_wind_gnn_v1"
description = "HRRR wind bias correction baseline"

# Model
hidden_dim = 64
n_hops = 1
use_graph = true
use_sx = true
use_flow_terrain = true

# Training
lr = 1e-3
weight_decay = 1e-5
huber_delta = 2.0
calm_threshold = 2.0
calm_min_weight = 0.1
correction_penalty = 0.0
batch_size = 16
epochs = 100
seed = 42
k_neighbors = 16
task = "wind"

# Data
table_path = "/nas/dads/mvp/station_day_hrrr_pnw.parquet"
stations_csv = "artifacts/madis_pnw.csv"
out_dir = "/nas/dads/mvp/hrrr_wind_gnn_v1"
train_years = [2018, 2019, 2020, 2021, 2022, 2023]
val_years = [2024]

# Spatial holdout
spatial_holdout_frac = 0.1
spatial_holdout_seed = 99
