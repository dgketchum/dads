name = "h8_hrrr_tmax_geosat"
description = "Single-head tmax: HRRR + CDR + 3h geosat IR + rsun + Landsat, hidden=128, stronger reg"

hidden_dim = 128
n_hops = 1
use_graph = true

lr = 1e-4
weight_decay = 3e-3
huber_delta = 1.0
dropout = 0.5
batch_size = 16
epochs = 100
seed = 42

train_years = [2018, 2019, 2020, 2021, 2022, 2023]
val_years = [2024]

graph_dir = "/nas/dads/mvp/h8_hrrr_tmax_geosat_graphs"
out_dir = "/nas/dads/mvp/h8_hrrr_tmax_geosat"
holdout_fids_json = "artifacts/canonical_holdout_fids.json"
stations_csv = "artifacts/madis_pnw.csv"
device = "cuda:0"
num_workers = 0
